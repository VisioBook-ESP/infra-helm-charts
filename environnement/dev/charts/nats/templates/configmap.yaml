apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nats.fullname" . }}-config
  labels:
    {{- include "nats.labels" . | nindent 4 }}
data:
  nats.conf: |
    listen: 0.0.0.0:4222
    http: 0.0.0.0:8222

    {{- if .Values.nats.jetstream.enabled }}
    jetstream {
      store_dir: /data/jetstream
      max_mem_store: {{ .Values.nats.jetstream.maxMemStore }}
      max_file_store: {{ .Values.nats.jetstream.maxFileStore }}
    }
    {{- end }}
