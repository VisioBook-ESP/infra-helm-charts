replicaCount: 1
name: minio

image:
  repository: minio/minio
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}

podLabels:
  app: minio
  version: v1

podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 9000
  consolePort: 9001

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

minio:
  auth:
    rootUser: "minioadmin"
    rootPassword: "minioadmin123"
  defaultBuckets: ""
  persistence:
    enabled: true
    storageClass: "standard"
    accessMode: ReadWriteOnce
    size: 10Gi

istio:
  enabled: true
  injection: true
  connectionPool:
    maxConnections: 100
  mtls:
    enabled: true
    mode: ISTIO_MUTUAL
  peerAuthentication:
    mode: STRICT
