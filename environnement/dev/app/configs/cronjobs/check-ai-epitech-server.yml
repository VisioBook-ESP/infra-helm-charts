apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcheck-external-api
  namespace: visiobook-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthcheck-external-api
  template:
    metadata:
      labels:
        app: healthcheck-external-api
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: healthcheck
        image: curlimages/curl:8.10.1
        command: ["/bin/sh", "-c"]
        args:
          - |
            while true; do
              sleep 60
            done
        livenessProbe:
          exec:
            command:
              - curl
              - -fsS
              - --max-time
              - "10"
              - http://100.120.93.126:8000/health
          initialDelaySeconds: 10
          periodSeconds: 60
          failureThreshold: 3
          timeoutSeconds: 15
