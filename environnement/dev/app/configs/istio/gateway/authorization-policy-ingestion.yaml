apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: authz-users
  namespace: istio-system
spec:
  selector:
    matchLabels:
      istio: ingress
  action: ALLOW
  rules:
  # User authentifie -> son propre profil
  - from:
    - source:
        requestPrincipals: ["*"]
    to:
    - operation:
        paths: ["/api/v1/ingest"]
        methods: ["GET", "POST"]

  - from:
    - source:
        requestPrincipals: ["*"]
    to:
    - operation:
        paths: ["/api/v1/ingest"]
        methods: ["GET", "POST"]

  - from:
    - source:
        requestPrincipals: ["*"]
    to:
    - operation:
        paths: ["/api/v1/ingest"]
        methods: ["GET", "POST"]
