apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: ingestion-routes
  namespace: visiobook-namespace
spec:
  hosts:
  - "*"
  gateways:
  - istio-system/visiobook-gateway
  http:
  - match:
    - uri:
        prefix: "/api/v1/projects"
    - uri:
        prefix: "/api/v1/shared"

    route:
    - destination:
        host: core-project-service
        port:
          number: 3000
