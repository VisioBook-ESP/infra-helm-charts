apiVersion: v1
kind: Secret
metadata:
  name: minio-analysis-secret
  namespace: visiobook-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    app: minio-analysis
type: Opaque
stringData:
  # ===== MinIO root credentials =====
  root-user: "analysis-admin"
  root-password: "AnalysisMinioPass123!"

  # ===== Application connection (ai-analysis-service) =====
  MINIO_ENDPOINT: "minio-analysis.visiobook-namespace.svc.cluster.local"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_ACCESS_KEY: "analysis-admin"
  MINIO_SECRET_KEY: "AnalysisMinioPass123!"
  MINIO_BUCKET_RESULTS: "analysis-results"
  MINIO_BUCKET_MODELS: "models"
  MINIO_BUCKET_REPORTS: "reports"
