apiVersion: v1
kind: Secret
metadata:
  name: minio-storage-secret
  namespace: visiobook-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    app: minio-storage
type: Opaque
stringData:
  # ===== MinIO root credentials =====
  root-user: "storage-admin"
  root-password: "StorageMinioPass123!"

  # ===== Application connection (content-ingestion-service, support-storage-service) =====
  MINIO_ENDPOINT: "minio-storage.visiobook-namespace.svc.cluster.local"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_ACCESS_KEY: "storage-admin"
  MINIO_SECRET_KEY: "StorageMinioPass123!"
  MINIO_BUCKET_DOCUMENTS: "documents"
  MINIO_BUCKET_UPLOADS: "uploads"
  MINIO_BUCKET_THUMBNAILS: "thumbnails"
