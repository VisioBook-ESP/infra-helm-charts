apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  timeout.reconciliation: "60s"  # Vérifie toutes les 60 secondes (au lieu de 3 minutes par défaut)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
data:
  controller.app.resync.period: "60"  # Force le controller à resync toutes les 60s